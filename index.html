<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Currency Converter</title>
</head>
<body>
    <div class="background-gradient"></div>
    
    <div class="container">
        <div class="header">
            <i class="fas fa-money-bill-wave"></i>
            <h1>Currency Converter</h1>
            <p class="subtitle">Real-time exchange rates</p>
        </div>

        <!-- Skeleton Loading -->
        <div class="skeleton-loader" id="skeletonLoader">
            <div class="skeleton-input"></div>
            <div class="skeleton-dropdown"></div>
            <div class="skeleton-msg"></div>
            <div class="skeleton-button"></div>
        </div>

        <!-- Main Form -->
        <form id="mainForm" class="hidden">
            <div class="amount-section">
                <label for="amountInput">Enter Amount</label>
                <div class="input-wrapper">
                    <i class="fas fa-dollar-sign"></i>
                    <input type="number" id="amountInput" value="1" min="0" step="0.01">
                </div>
            </div>

            <div class="dropdown">
                <div class="currency-box from">
                    <label>From</label>
                    <div class="select">
                        <img id="fromFlag" src="https://flagsapi.com/US/flat/64.png" alt="flag">
                        <select name="from" id="fromSelect"></select>
                    </div>
                </div>

                <button type="button" class="swap-btn" id="swapBtn" title="Swap currencies">
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                </button>

                <div class="currency-box to">
                    <label>To</label>
                    <div class="select">
                        <img id="toFlag" src="https://flagsapi.com/IN/flat/64.png" alt="flag">
                        <select name="to" id="toSelect"></select>
                    </div>
                </div>
            </div>

            <div class="result-section">
                <div class="msg" id="result">1 USD = 90 INR</div>
                <div class="exchange-info" id="exchangeInfo"></div>
            </div>

            <button type="submit" class="convert-btn" id="convertBtn">
                <i class="fas fa-exchange-alt"></i> Convert
            </button>
        </form>
    </div>
    <script src="codes.js"></script>
    <script src="app.js"></script>
</body>
</html>
